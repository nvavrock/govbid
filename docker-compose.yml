services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-govbid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-govbid}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
      - ./db/queries:/queries:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-govbid} -d ${POSTGRES_DB:-govbid}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      # Host 5433 avoids conflict with local PostgreSQL on Windows/WSL (often 5432)
      - "127.0.0.1:5433:5432"

  n8n:
    image: n8nio/n8n:1.121.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-govbid}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-govbid}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?Set N8N_BASIC_AUTH_PASSWORD in .env}
      GENERIC_TIMEZONE: America/New_York
      TZ: America/New_York
      SAM_API_KEY: ${SAM_API_KEY:-}
      SAM_BULK_CSV_URL: ${SAM_BULK_CSV_URL:-}
      SAM_NAICS_CODES: ${SAM_NAICS_CODES:-541511,541512,541519,518210,511210}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./config:/config:ro
      - ./data:/data
      - ./db/queries:/queries:ro
      - ./workflows/n8n:/workflows/n8n:ro

  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
  n8n_data:
