services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-govbid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-govbid}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
      - ./db/queries:/queries:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-govbid} -d ${POSTGRES_DB:-govbid}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      # Host 5433 avoids conflict with local PostgreSQL on Windows/WSL (often 5432)
      - "127.0.0.1:5433:5432"

  n8n:
    image: n8nio/n8n:2.17.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-govbid}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-govbid}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?Set N8N_BASIC_AUTH_PASSWORD in .env}
      N8N_RUNNERS_ENABLED: "true"
      N8N_INSTANCE_OWNER_MANAGED_BY_ENV: "true"
      N8N_INSTANCE_OWNER_EMAIL: ${N8N_OWNER_EMAIL:-nvavrock@gmail.com}
      N8N_INSTANCE_OWNER_FIRST_NAME: ${N8N_OWNER_FIRST_NAME:-Admin}
      N8N_INSTANCE_OWNER_LAST_NAME: ${N8N_OWNER_LAST_NAME:-User}
      N8N_INSTANCE_OWNER_PASSWORD_HASH: ${N8N_INSTANCE_OWNER_PASSWORD_HASH:?Run bash scripts/generate-n8n-owner-hash.sh}
      GENERIC_TIMEZONE: America/New_York
      TZ: America/New_York
      SAM_API_KEY: ${SAM_API_KEY:-}
      SAM_BULK_CSV_URL: ${SAM_BULK_CSV_URL:-}
      SAM_NAICS_CODES: ${SAM_NAICS_CODES:-541511,541512,541519,518210,511210}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./config:/config:ro
      - ./data:/data
      - ./db/queries:/queries:ro
      - ./workflows/n8n:/workflows/n8n:ro

  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  consig-api:
    build:
      context: .
      dockerfile: Dockerfile.consig
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CONSIG_DATA_DIR: /app/data/consig_index
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./transcripts:/app/transcripts:ro

  consig-ui:
    build:
      context: .
      dockerfile: Dockerfile.consig
    restart: unless-stopped
    command: ["uv", "run", "streamlit", "run", "consig/ui.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    depends_on:
      - consig-api
    env_file: .env
    environment:
      CONSIG_API_URL: http://consig-api:8000
      CONSIG_INPROCESS: "0"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./transcripts:/app/transcripts:ro

volumes:
  postgres_data:
  n8n_data:
