# Copy to match-profile.yaml and customize for your business.
# Synced to fit_profiles table on ingest. See docs/counsel-plan.md.

profile:
  slug: default
  name: "Rocksteady Analytics"
  capabilities: |
    Custom software development, cloud migration, DevSecOps,
    API integrations, and technical consulting.

# full = load all active SAM rows; filtered = NAICS/PSC/keyword gate at ingest
ingest:
  mode: full

# Hard filters — used for scoring and for ingest when mode=filtered
naics_codes:
  - "541511"
  - "541512"
  - "541519"
  - "518210"
  - "511210"

psc_prefixes:
  - "D3"
  - "7E"

procurement_types:
  - "o"
  - "k"
  - "p"
  - "r"

include_keywords:
  - "software"
  - "application"
  - "cloud"
  - "devsecops"
  - "cybersecurity"
  - "api"
  - "modernization"
  - "saas"
  - "database"
  - "agile"

exclude_keywords:
  - "construction"
  - "janitorial"
  - "landscaping"
  - "hardware only"
  - "furniture"
  - "vehicles"

exclude_set_asides:
  - "8(a)"
  - "HUBZone"
  - "SDVOSB"
  - "WOSB"
  - "EDWOSB"

# Best-fit queue: rank by rule_score; min_score 0 = no numeric gate
review:
  days_ahead: 30
  min_score: 0
  top_n: 25
  require_match_reasons: true

# Geography: local home state(s) + remote; hide on-site work elsewhere
geography:
  home_states: []
  include_remote: true
  include_unknown_location: false
